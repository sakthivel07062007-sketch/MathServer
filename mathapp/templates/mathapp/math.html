<!DOCTYPE html>
<html>
<head>
    <title>GST Calculator</title>
</head>

<body>

<h1>GST Calculator</h1>

<form method="POST">

    {% csrf_token %}

    <label>Price:</label>
    <input type="number" name="price"><br><br>

    <label>GST Percentage:</label>
    <input type="number" name="gst"><br><br>

    <input type="submit" value="Calculate">

</form>

<h2>{{ result }}</h2>

</body>
